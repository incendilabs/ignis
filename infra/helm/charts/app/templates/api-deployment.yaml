apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app.api.fullname" . }}
  labels:
    {{- include "app.api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "app.api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "app.api.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1654
      containers:
        - name: ignis-api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            # Trust X-Forwarded-* so redirect URLs (e.g. OAuth callbacks)
            # use the external https scheme instead of the internal http
            # one the pod sees behind the Gateway. Only enable when the
            # pod is reachable exclusively through a trusted proxy —
            # otherwise any in-cluster caller could spoof
            # X-Forwarded-Proto/Host/For.
            {{- if .Values.api.trustForwardedHeaders }}
            - name: ASPNETCORE_FORWARDEDHEADERS_ENABLED
              value: "true"
            {{- end }}
            - name: SparkSettings__Endpoint
              value: {{ .Values.api.sparkSettings.endpoint | quote }}
            - name: SparkSettings__FhirRelease
              value: {{ .Values.api.sparkSettings.fhirRelease | quote }}
          envFrom:
            - secretRef:
                name: {{ .Values.api.existingSecret | default (include "app.api.fullname" .) }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
{{- if .Values.api.extraVolumeMounts }}
          volumeMounts:
            {{- toYaml .Values.api.extraVolumeMounts | nindent 12 }}
{{- end }}
{{- if .Values.api.extraVolumes }}
      volumes:
        {{- toYaml .Values.api.extraVolumes | nindent 8 }}
{{- end }}
