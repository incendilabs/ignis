apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app.api.fullname" . }}
  labels:
    {{- include "app.api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "app.api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "app.api.selectorLabels" . | nindent 8 }}
      {{- with .Values.api.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1654
      {{- if .Values.api.fhirPackages.packages }}
      initContainers:
        # Seed a shared volume with the image's built-in packages, then download
        # the extra ones so $validate can resolve their profiles without a rebuild.
        - name: fetch-fhir-packages
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              cp -f /app/fhir-packages/*.tgz /fhir-packages/ 2>/dev/null || true
              for spec in {{ range .Values.api.fhirPackages.packages }}{{ . | squote }} {{ end }}; do
                case "$spec" in
                  ?*@?*) ;;
                  *) echo "Invalid fhirPackages entry '$spec'; expected id@version" >&2; exit 1 ;;
                esac
                id="${spec%@*}"; ver="${spec##*@}"
                echo "Fetching ${id}@${ver}"
                wget -q --tries=3 -O "/fhir-packages/${id}-${ver}.tgz" "{{ .Values.api.fhirPackages.registry }}/${id}/${ver}"
              done
              ls -1 /fhir-packages
          volumeMounts:
            - name: fhir-packages
              mountPath: /fhir-packages
      {{- end }}
      containers:
        - name: ignis-api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            {{- $allowedHosts := default .Values.api.hostnames .Values.api.allowedHosts }}
            - name: AllowedHosts
              value: {{ prepend $allowedHosts "localhost" | join ";" | quote }}
            {{- range $index, $proxy := .Values.api.forwardedHeaders.knownProxies }}
            - name: ForwardedHeaders__KnownProxies__{{ $index }}
              value: {{ $proxy | quote }}
            {{- end }}
            {{- range $index, $network := .Values.api.forwardedHeaders.knownNetworks }}
            - name: ForwardedHeaders__KnownNetworks__{{ $index }}
              value: {{ $network | quote }}
            {{- end }}
            - name: SparkSettings__Endpoint
              value: {{ .Values.api.sparkSettings.endpoint | quote }}
            - name: SparkSettings__FhirRelease
              value: {{ .Values.api.sparkSettings.fhirRelease | quote }}
            {{- if .Values.api.authSettings.issuer }}
            - name: AuthSettings__Issuer
              value: {{ .Values.api.authSettings.issuer | quote }}
            {{- end }}
            {{- if .Values.api.fhirPackages.packages }}
            - name: ProfileValidationSettings__PackageDirectory
              value: /fhir-packages
            {{- end }}
            {{- with .Values.api.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ .Values.api.existingSecret | default (include "app.api.fullname" .) }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
              httpHeaders:
                - name: Host
                  value: localhost
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
              httpHeaders:
                - name: Host
                  value: localhost
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
{{- if or .Values.api.fhirPackages.packages .Values.api.extraVolumeMounts }}
          volumeMounts:
            {{- if .Values.api.fhirPackages.packages }}
            - name: fhir-packages
              mountPath: /fhir-packages
            {{- end }}
            {{- with .Values.api.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
{{- end }}
{{- if or .Values.api.fhirPackages.packages .Values.api.extraVolumes }}
      volumes:
        {{- if .Values.api.fhirPackages.packages }}
        - name: fhir-packages
          emptyDir: {}
        {{- end }}
        {{- with .Values.api.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
{{- end }}
