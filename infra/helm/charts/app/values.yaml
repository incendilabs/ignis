api:
  replicaCount: 1
  image:
    repository: ignis-api
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  sparkSettings:
    endpoint: "http://ignis-api:8080/fhir"
    fhirRelease: "R4"
  authSettings:
    # Public-facing issuer URL advertised in the OIDC discovery document.
    # Set when the API runs behind a Gateway / proxy that terminates TLS;
    # otherwise OpenIddict derives it from Request.Host (the in-cluster
    # pod hostname) and the metadata becomes unusable to external clients.
    issuer: ""
  # Set to true when a trusted reverse proxy / Gateway fronts the pod so
  # ASP.NET Core honours X-Forwarded-* (needed for OAuth redirect URLs
  # behind TLS termination). Leave false if the pod is reachable by
  # untrusted in-cluster callers.
  trustForwardedHeaders: false
  externalMongodbConnectionString: ""
  existingSecret: ""
  # Extra volume mounts for the API container (e.g. for certificate files)
  extraVolumeMounts: []
  # Extra volumes for the API pod (e.g. Kubernetes Secrets)
  extraVolumes: []
  # Hostnames for API HTTPRoute
  hostnames: []

web:
  enabled: true
  replicaCount: 1
  image:
    repository: ignis-web
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  # Hostnames for Web HTTPRoute
  hostnames: []

gateway:
  enabled: true
  # Name of the Gateway resource to attach HTTPRoutes to
  name: "ignis-gateway"
  # Namespace of the Gateway (if different from release namespace)
  namespace: ""
