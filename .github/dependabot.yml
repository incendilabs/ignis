version: 2

updates:
  - package-ecosystem: npm
    directory: /src/Ignis.Web
    schedule:
      interval: daily
    cooldown:
      default-days: 14
    commit-message:
      prefix: "Deps (Web)"
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    # @types/node should be updated manually to ensure alignment with the Node.js 
    # version used in the project
    ignore:
      - dependency-name: "@types/node"
        update-types:
          - version-update:semver-major
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 14
    commit-message:
      prefix: "Deps (Api)"
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 14
    commit-message:
      prefix: "Deps (CI)"
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directories:
      - /src/Ignis.Api
      - /src/Ignis.Web
    schedule:
      interval: daily
    cooldown:
      default-days: 14
    commit-message:
      prefix: "Deps (CI)"
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: helm
    directory: /infra/helm
    schedule:
      interval: daily
    cooldown:
      default-days: 14
    commit-message:
      prefix: "Deps (Infra)"
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
