version: 2

updates:
  - package-ecosystem: npm
    directory: /src/Ignis.Web
    schedule:
      interval: daily
    cooldown:
      default-days: 14
    commit-message:
      prefix: "Deps (Web)"
    groups:
      # Always bump React Router packages together
      react-router:
        patterns:
          - "react-router*"
          - "@react-router/*"
      # React core moves in lockstep with its type definitions
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    # @types/node should be updated manually to ensure alignment with the Node.js
    # version used in the project
    ignore:
      - dependency-name: "@types/node"
        update-types:
          - version-update:semver-major
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 14
    commit-message:
      prefix: "Deps (Api)"
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  # CI + infra: batch everything into a single PR per ecosystem.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    cooldown:
      default-days: 14
    commit-message:
      prefix: "Deps (CI)"
    groups:
      all:
        patterns:
          - "*"

  - package-ecosystem: docker
    directories:
      - /src/Ignis.Api
      - /src/Ignis.Web
    schedule:
      interval: weekly
    cooldown:
      default-days: 14
    commit-message:
      prefix: "Deps (CI)"
    groups:
      all:
        patterns:
          - "*"

  - package-ecosystem: helm
    directory: /infra/helm
    schedule:
      interval: monthly
    cooldown:
      default-days: 14
    commit-message:
      prefix: "Deps (Infra)"
    groups:
      all:
        patterns:
          - "*"
